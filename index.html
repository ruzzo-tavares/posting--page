<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Post-Tester</title>

  <style>
    :root{
      --primary:#6750A4; 
      --accent:#03DAC6;
      --bg: #1a0033;
      --card: #25106a;
      --muted: #000000;
      --radius:14px;
      --shadow: 0 6px 18px rgba(16,24,40,0.08);
      --bg-image: url("/assets/fundo-page.png");
      --radius:14px;
      --shadow: 0 6px 18px rgba(16,24,40,0.08);
      --glass: rgba(255,255,255,0.6);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
  margin:0;
  font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg-image);  
  background-size: cover;       
  background-position: center;  
  background-attachment: fixed;
  color:#222;
  line-height:1.6;
}

    nav{
      position:sticky;top:0;z-index:40;
      background:linear-gradient(90deg,var(--primary),#4b3b9a);
      padding:16px 24px;box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    nav .container{
      max-width:800px;margin:0 auto;
      display:flex;align-items:center;justify-content:center;
    }

    .brand{
      color:white;font-weight:700;font-size:1.3rem;
      display:flex;align-items:center;gap:12px;
    }

    .brand .dot{
      width:12px;height:12px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 12px rgba(3,218,198,0.4);
    }

    .wrap{max-width:800px;margin:32px auto;padding:0 20px;}

    main#home{margin:0;}
    .banner{
      height:280px;display:flex;align-items:center;justify-content:center;
      background:transparent;
      background-size:cover;background-position:center;
      border-radius:var(--radius);box-shadow:var(--shadow);
    }

    .banner-content{
      background:var(--glass);backdrop-filter:blur(20px);
      color:rgb(46, 54, 84);padding:32px 40px;border-radius:20px;
      text-align:center;max-width:600px;box-shadow:0 20px 40px rgba(183, 9, 9, 0.2);
    }

    .banner h1{
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:800;margin:0 0 12px;
  background:linear-gradient(45deg,#0c4652,rgb(103, 2, 2));
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

    #form-section{
      background:var(--card);padding:40px;border-radius:var(--radius);
      box-shadow:var(--shadow);margin:32px 0;
    }

    .form-group{
      display:flex;flex-direction:column;gap:16px;margin-bottom:24px;
    }

    .form-group label{
      font-weight:600;color:var(--primary);font-size:0.95rem;
    }

    .form-group input,
    .form-group textarea{
      padding:16px;border:2px solid rgba(103,80,164,0.1);
      border-radius:12px;font-family:inherit;
      font-size:1rem;transition:all 0.3s ease;
      background:var(--glass);
    }

    .form-group input:focus,
    .form-group textarea:focus{
      outline:none;border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(3,218,198,0.1);
      transform:translateY(-2px);
    }

    #form-title{
        color: #ffffff; 
    }


@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

    textarea{resize:vertical;min-height:120px;max-height:240px;}

    .btn-post{
      background:linear-gradient(135deg,var(--primary),#5a4690);
      color:white;border:none;padding:18px 32px;
      border-radius:12px;font-weight:700;font-size:1.1rem;
      cursor:pointer;transition:all 0.3s cubic-bezier(0.2,0.9,0.3,1);
      box-shadow:var(--shadow);
    }

    .btn-post:hover{
      transform:translateY(-4px) scale(1.02);
      box-shadow:0 20px 40px rgba(103,80,164,0.4);
    }

    .btn-post:active{transform:translateY(-2px);}

    #post-render{
      background: var(--card);padding:32px;border:2px solid rgba(103,80,164,0.1);
      min-height: 300px;
      border-radius:var(--radius);box-shadow:var(--shadow);
      margin:32px 0;min-height:200px;
      border-left:5px solid var(--accent);
    }

    #render-titulo{
      font-size:1.8rem;font-weight:800;color:var(--primary);
      margin:0 0 16px;background:var(--card);
      padding:16px 20px;border-radius:10px;box-shadow:var(--shadow);
    }

    #render-body{
      font-size:1.1rem;color:var(--muted);line-height:1.7;
      margin:0;background:var(--card);
      padding:24px;border-radius:10px;box-shadow:var(--shadow);
      white-space:pre-wrap;
    }

    .status{
      padding:12px 20px;border-radius:10px;margin:16px 0;
      font-weight:600;text-align:center;
    }

    .status.success{
      background:rgba(3,218,198,0.1);color:var(--accent);
      border:1px solid rgba(3,218,198,0.3);
    }

    .status.error{
      background:rgba(239,68,68,0.1);color:#ef4444;
      border:1px solid rgba(239,68,68,0.3);
    }

    .status.loading{
      background:rgba(103,80,164,0.1);color:var(--primary);
      border:1px solid rgba(103,80,164,0.3);
    }

    @media (max-width:768px){
      .wrap{padding:0 16px;margin:20px auto;}
      #form-section{padding:28px 20px;}
      .banner{height:260px;}
      .banner-content{padding:24px 28px;}
      nav{padding:12px 16px;}
      .brand{font-size:1.1rem;}
    }

    @media (max-width:480px){
      .btn-post{width:100%;padding:16px;}
      #post-render{padding:24px 20px;}
    }

  </style>
</head>
<body>
  <nav aria-label="Navegação principal">
    <div class="container">
      <div class="brand">
        <span class="dot"></span>
        <span>RoximBook</span>
      </div>
    </div>
  </nav>

  <main id="home">
    <section class="banner" aria-label="Hero banner">
      <div class="banner-content">
        <h1>Mural de Postagens</h1>
        <p>Conte suas experiências ao mundo !</p>
      </div>
    </section>
  </main>

  <div class="wrap">
    <section id="form-section" aria-labelledby="form-title">
      <h2 id="form-title" class="section-title">🌎 Novo Post</h2>
      
      <form id="postForm">
        <div class="form-group">
          <label for="post-titulo">Título do Post</label>
          <input 
            type="text" 
            id="post-titulo" 
            name="titulo" 
            placeholder="Ex: Uma viagem inesquecível!"
            required 
            maxlength="100"
          />
        </div>

        <div class="form-group">
          <label for="post-conteudo">Conteúdo</label>
          <textarea 
            id="post-conteudo" 
            name="conteudo" 
            placeholder="Descreva sua experiência... O que vivenciou, experimentou, sentiu?"
            required 
            maxlength="500"
          ></textarea>
        </div>

        <button type="submit" class="btn-post" aria-label="Enviar post">
          ᯓ✈︎ Publicar Post
        </button>
      </form>

      <div id="status" class="status" aria-live="polite" role="status"></div>
    </section>

    <section id="post-render" aria-labelledby="render-title">
      <h2 id="render-title" class="section-title">💬 Publicações</h2>
      <h1 id="render-titulo">Clique em "Publicar Post" para criar seu primeiro post!</h1>
      <p id="render-body">Seu conteúdo aparecerá aqui</p>
    </section>
  </div>
  <script>
const form = document.querySelector('#postForm');
const tituloInput = document.querySelector('#post-titulo');
const conteudoInput = document.querySelector('#post-conteudo');
const postsContainer = document.querySelector('#post-render');
const statusDiv = document.querySelector('#status');

let allPosts = [];  // Armazena posts

// FUNÇÃO RENDERIZA TODOS OS POSTS
function renderPosts(posts = allPosts) {
  const html = posts.slice(0, 5).map(post => `
    <div style="margin-bottom:20px;padding:20px;background:var(--glass);border-radius:12px;">
      <h3 style="color:#fff;margin:0 0 10px;">✨ ${post.title}</h3>
      <p style="color:var(--muted);margin:0;line-height:1.6;">${post.body}</p>
      <small style="color:#aaa;">ID: ${post.id} | User: ${post.userId}</small>
    </div>
  `).join('');
  
  postsContainer.innerHTML = `
    <h2 id="render-title" style="color:#fff;">💬 Publicações (${posts.length})</h2>
    ${html || '<p style="color:#aaa;">Nenhum post ainda...</p>'}
  `;
}

// CARREGA POSTS REAIS DA API
async function loadPosts() {
  try {
    const response = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=10');
    allPosts = await response.json();
    renderPosts();
  } catch {
    allPosts = [];  // Vazio se API down
    renderPosts();
  }
}

// NOVO POST
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    title: tituloInput.value.trim(),
    body: conteudoInput.value.trim(),
    userId: 1
  };

  if (!data.title || !data.body) return;

  statusDiv.textContent = '📤 Publicando...';
  statusDiv.className = 'status loading';

  try {
    // POST na API
    const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-type': 'application/json; charset=UTF-8' }
    });

    const newPost = await response.json();
    newPost.id = Date.now();  // ID simulado

    // ADICIONA NO TOPO
    allPosts.unshift(newPost);
    renderPosts();

    statusDiv.innerHTML = `✅ Publicado! (${allPosts.length} total)`;
    statusDiv.className = 'status success';

  } catch {
    // Simula se API falhar
    data.id = Date.now();
    allPosts.unshift(data);
    renderPosts();
    statusDiv.innerHTML = `✅ Simulado! (${allPosts.length} total)`;
    statusDiv.className = 'status success';
  }

  tituloInput.value = '';
  conteudoInput.value = '';
});

// INICIA
loadPosts();
</script>
</body>
</html>
